name: Daily weather pipeline

on:
  schedule:
    # 19:30 UTC is early morning in Australia, after the archive updates
    - cron: "30 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests pandas duckdb

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather_daily.csv dashboard.html
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "Daily data update $(date -u +%F)"
            git push
          fi
